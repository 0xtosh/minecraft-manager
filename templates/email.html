<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Import Minecraft-like pixel font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'VT323', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            
            /* Authentic Minecraft Options Menu Dirt Background */
            background-color: #3c2f23; 
            background-image: 
                radial-gradient(circle, transparent 30%, rgba(0, 0, 0, 0.75) 100%),
                linear-gradient(90deg, rgba(0, 0, 0, 0.12) 50%, transparent 50%),
                linear-gradient(rgba(0, 0, 0, 0.12) 50%, transparent 50%);
            background-size: 100% 100%, 16px 16px, 16px 16px;
            
            image-rendering: pixelated;
        }

        /* Minecraft Menu Box Styling */
        .card { 
            background: #c6c6c6; 
            padding: 30px; 
            border: 4px solid #555555;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            box-shadow: 0 0 0 4px #000000, 0 20px 0px rgba(0,0,0,0.5);
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            overflow: hidden; 
            position: relative; 
            min-height: 240px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            box-sizing: border-box; 
        }
        
        /* FIXED: Changed to authentic dark gray Minecraft GUI text color for high contrast */
        h2 { 
            margin-top: 0; 
            color: #404040; 
            font-size: 34px; 
            margin-bottom: 25px; 
            letter-spacing: 0.5px;
            text-shadow: none;
        }

        /* Inset black text fields */
        input[type="email"] { 
            width: 100%; 
            padding: 10px; 
            margin: 15px 0; 
            background-color: #000000;
            border: 3px solid #a0a0a0;
            color: #ffffff;
            box-sizing: border-box; 
            font-size: 24px; 
            font-family: 'VT323', monospace;
            outline: none; 
        }
        input[type="email"]:focus { 
            border-color: #ffffff; 
        }
        
        /* Minecraft UI Button Styling */
        button { 
            width: 100%; 
            padding: 12px; 
            background: #7c7c7c; 
            color: #e0e0e0; 
            border: 3px solid #000000;
            box-shadow: inset -3px -3px 0px #4a4a4a, inset 3px 3px 0px #dadada;
            font-size: 24px; 
            font-family: 'VT323', monospace;
            cursor: pointer; 
            text-shadow: 2px 2px 0px #2a2a2a;
        }
        button:hover { 
            background: #8c8c8c;
            color: #ffff55; 
            box-shadow: inset -3px -3px 0px #5a5a5a, inset 3px 3px 0px #eaeaea;
        }
        button:active {
            box-shadow: inset 3px 3px 0px #4a4a4a, inset -3px -3px 0px #dadada;
            padding-top: 14px;
            padding-bottom: 10px;
        }
        
        /* Minecraft Red Alert Box */
        .alert { 
            padding: 10px; 
            font-size: 20px; 
            margin-bottom: 20px; 
            text-align: center; 
            background-color: #550000; 
            color: #ff5555; 
            border: 3px solid #ff5555; 
            text-shadow: 2px 2px 0px #000000;
        }
        
        #form-container { 
            display: none; 
            width: 100%; 
            opacity: 0; 
            transition: opacity 0.4s ease-in-out; 
        }
        
        /* --- SLIDE TO UNLOCK WIDGET STYLES --- */
        #slider-container { 
            width: 100%; 
            position: relative; 
        }
        .slider-track { 
            height: 55px; 
            background: #4a4a4a; 
            border: 3px solid #000000;
            box-shadow: inset 3px 3px 0px #2a2a2a;
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            user-select: none; 
            overflow: hidden; 
        }
        .slider-text { 
            font-size: 22px; 
            color: #e0e0e0; 
            text-shadow: 2px 2px 0px #1a1a1a;
            pointer-events: none; 
            z-index: 1; 
        }
        
        .slider-handle { 
            width: 47px; 
            height: 43px; 
            background: #7c7c7c; 
            border: 3px solid #000000;
            box-shadow: inset -3px -3px 0px #4a4a4a, inset 3px 3px 0px #dadada;
            position: absolute; 
            left: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: grab; 
            z-index: 2; 
        }
        .slider-handle:active { 
            cursor: grabbing; 
            background: #8c8c8c; 
        }
        .slider-handle::after { 
            content: "»"; 
            color: #e0e0e0; 
            font-size: 26px; 
            font-weight: bold; 
            text-shadow: 2px 2px 0px #2a2a2a;
        }
        
        .slider-bg { 
            position: absolute; 
            left: 0; 
            top: 0; 
            height: 100%; 
            background: rgba(90, 220, 90, 0.35); 
            width: 0; 
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="slider-container">
            <h2>Prove You Are Human</h2>
            <div class="slider-track" id="track">
                <div class="slider-bg" id="slider-bg"></div>
                <div class="slider-handle" id="handle"></div>
                <span class="slider-text" id="slider-text">Slide to unlock login</span>
            </div>
        </div>

        <div id="form-container">
            <h2>System Login</h2>
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
            <form method="POST">
                <input type="email" name="email" placeholder="Enter whitelisted email" required autocomplete="on">
                <button type="submit">Continue</button>
            </form>
        </div>
    </div>

    <script>
        const handle = document.getElementById('handle');
        const track = document.getElementById('track');
        const sliderBg = document.getElementById('slider-bg');
        const sliderText = document.getElementById('slider-text');
        const sliderContainer = document.getElementById('slider-container');
        const formContainer = document.getElementById('form-container');

        let isDragging = false;
        let startX = 0;
        let maxLeft = track.clientWidth - handle.clientWidth - 8; 

        window.addEventListener('resize', () => {
            maxLeft = track.clientWidth - handle.clientWidth - 8;
        });

        function startDrag(e) {
            isDragging = true;
            startX = (e.type === 'touchstart') ? e.touches[0].clientX : e.clientX;
            handle.style.transition = 'none';
            sliderBg.style.transition = 'none';
        }

        function doDrag(e) {
            if (!isDragging) return;
            const currentX = (e.type === 'touchmove') ? e.touches[0].clientX : e.clientX;
            let moveX = currentX - startX;

            if (moveX < 0) moveX = 0;
            if (moveX > maxLeft) moveX = maxLeft;

            handle.style.left = (moveX + 4) + 'px';
            sliderBg.style.width = (moveX + handle.clientWidth) + 'px';

            sliderText.style.opacity = 1 - (moveX / maxLeft);

            if (moveX >= maxLeft) {
                isDragging = false;
                successUnlock();
            }
        }

        function stopDrag() {
            if (!isDragging) return;
            isDragging = false;
            handle.style.transition = 'left 0.3s ease';
            sliderBg.style.transition = 'width 0.3s ease';
            sliderText.style.transition = 'opacity 0.3s ease';
            
            handle.style.left = '4px';
            sliderBg.style.width = '0px';
            sliderText.style.opacity = 1;
        }

        function successUnlock() {
            detachEvents();
            sliderContainer.style.display = 'none';
            formContainer.style.display = 'block';
            setTimeout(() => {
                formContainer.style.opacity = '1';
                formContainer.querySelector('input[type="email"]').focus();
            }, 50);
        }

        function attachEvents() {
            handle.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', doDrag);
            window.addEventListener('mouseup', stopDrag);

            handle.addEventListener('touchstart', startDrag);
            window.addEventListener('touchmove', doDrag);
            window.addEventListener('touchend', stopDrag);
        }

        function detachEvents() {
            handle.removeEventListener('mousedown', startDrag);
            window.removeEventListener('mousemove', doDrag);
            window.removeEventListener('mouseup', stopDrag);

            handle.removeEventListener('touchstart', startDrag);
            window.removeEventListener('touchmove', doDrag);
            window.removeEventListener('touchend', stopDrag);
        }

        attachEvents();

        if (document.querySelector('.alert')) {
            sliderContainer.style.display = 'none';
            formContainer.style.display = 'block';
            formContainer.style.opacity = '1';
        }
    </script>
</body>
</html>
